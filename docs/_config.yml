title: System Design Notes
description: Deep-dive notes on networking protocols and API design for system design interviews and real-world engineering.
remote_theme: just-the-docs/just-the-docs@v0.10.0
color_scheme: dark

# Permalink style
permalink: pretty

# Exclude files Jekyll shouldn't process
exclude:
  - .obsidian
  - copilot
  - "*.py"

# Enable search
search_enabled: true
search.heading_level: 3

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com"

# Footer
footer_content: "System Design &mdash; Networking Essentials"

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"
